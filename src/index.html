<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Billbook</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <p class="eyebrow">Journal</p>
          <div class="sidebar-title-row">
            <h1>Billbook</h1>
          </div>
          <div class="sidebar-actions">
            <button id="choose-folder-button" class="button button-secondary no-drag" type="button">
              Choose Folder
            </button>
            <button id="new-entry-button" class="button button-primary no-drag" type="button">
              New Entry
            </button>
          </div>
          <div class="location-panel no-drag">
            <p class="location-label">Saving To</p>
            <button id="directory-link" class="directory-link" type="button">
              <span id="directory-name" class="directory-name">No folder selected</span>
              <span id="directory-path" class="directory-path"></span>
            </button>
          </div>
        </div>

        <div id="entries-tree" class="entries-tree"></div>
      </aside>

      <main class="editor-panel">
        <div class="editor-drag-strip" aria-hidden="true"></div>
        <div class="editor-toolbar">
          <div class="editor-toolbar-copy">
            <p class="editor-label">Current Entry</p>
            <button id="editor-subtitle" class="editor-subtitle-button no-drag" type="button">
              Select an entry or create a new one.
            </button>
          </div>
        </div>

        <div id="conflict-bar" class="conflict-bar is-hidden">
          <p id="conflict-message" class="conflict-message">This note changed outside Billbook.</p>
          <div class="conflict-actions">
            <button id="reload-entry-button" class="button button-secondary no-drag" type="button">
              Reload
            </button>
            <button id="keep-mine-button" class="button button-secondary no-drag" type="button">
              Keep Mine
            </button>
          </div>
        </div>

        <section id="empty-state" class="empty-state is-hidden">
          <div class="empty-state-copy">
            <p id="empty-state-title" class="empty-state-title">No journal folder selected.</p>
            <p id="empty-state-body" class="empty-state-body">Choose a folder to start.</p>
            <button id="empty-state-button" class="button button-secondary no-drag" type="button">
              Choose Folder
            </button>
          </div>
        </section>

        <section id="editor-form" class="editor-form is-hidden">
          <div class="editor-form-header">
            <div class="editor-form-actions">
              <span id="save-status" class="save-status-text">Saved</span>
            </div>
          </div>

          <label class="field-group" for="entry-date">
            <span class="field-label">Date</span>
            <input id="entry-date" class="text-input date-input" type="date" />
          </label>

          <label class="field-group" for="entry-title">
            <span class="field-label">Title</span>
            <input
              id="entry-title"
              class="text-input title-input"
              type="text"
              placeholder="Untitled"
              autocomplete="off"
            />
          </label>

          <div class="section-stack">
            <label class="field-group section-group" for="entry-feelings">
              <span class="field-label">Feelings</span>
              <textarea id="entry-feelings" class="section-input" spellcheck="true"></textarea>
            </label>

            <label class="field-group section-group" for="entry-moments">
              <span class="field-label">Moments</span>
              <textarea id="entry-moments" class="section-input" spellcheck="true"></textarea>
            </label>

            <label class="field-group section-group" for="entry-predictions">
              <span class="field-label">Predictions</span>
              <textarea id="entry-predictions" class="section-input" spellcheck="true"></textarea>
            </label>

            <label class="field-group section-group" for="entry-news">
              <span class="field-label">News</span>
              <textarea id="entry-news" class="section-input" spellcheck="true"></textarea>
            </label>

            <label class="field-group section-group" for="entry-happiness">
              <span class="field-label">Happiness</span>
              <textarea id="entry-happiness" class="section-input" spellcheck="true"></textarea>
            </label>
          </div>
        </section>
      </main>
    </div>

    <dialog id="confirm-dialog" class="confirm-dialog">
      <form method="dialog" class="confirm-dialog-card">
        <p id="confirm-title" class="confirm-title">Unsaved changes</p>
        <p id="confirm-body" class="confirm-body">
          Save your current work before continuing?
        </p>
        <div id="confirm-actions" class="confirm-actions"></div>
      </form>
    </dialog>

    <div id="folder-toast" class="folder-toast is-hidden"></div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
