<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Billbook</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <p class="eyebrow">Journal</p>
          <div class="sidebar-title-row">
            <h1>Billbook</h1>
            <span id="save-status" class="status-pill">Saved</span>
          </div>
          <div class="sidebar-actions">
            <button id="choose-folder-button" class="button button-secondary no-drag" type="button">
              Choose Folder
            </button>
            <button id="new-entry-button" class="button button-primary no-drag" type="button">
              New Entry
            </button>
          </div>
          <div class="location-panel no-drag">
            <p class="location-label">Saving To</p>
            <p id="directory-label" class="directory-label">No folder selected</p>
          </div>
        </div>

        <div id="entries-tree" class="entries-tree"></div>
      </aside>

      <main class="editor-panel">
        <div class="editor-drag-strip" aria-hidden="true"></div>
        <div class="editor-toolbar">
          <div class="editor-toolbar-copy">
            <p class="editor-label">Current Entry</p>
            <p id="editor-subtitle" class="editor-subtitle">Select an entry or create a new one.</p>
          </div>
          <div class="editor-toolbar-actions">
            <button id="save-button" class="button button-primary no-drag" type="button">
              Save
            </button>
          </div>
        </div>

        <div id="conflict-bar" class="conflict-bar" hidden>
          <p id="conflict-message" class="conflict-message">This note changed outside Billbook.</p>
          <div class="conflict-actions">
            <button id="reload-entry-button" class="button button-secondary no-drag" type="button">
              Reload
            </button>
            <button id="keep-mine-button" class="button button-secondary no-drag" type="button">
              Keep Mine
            </button>
          </div>
        </div>

        <section id="empty-state" class="empty-state">
          <div class="empty-state-copy">
            <p id="empty-state-title" class="empty-state-title">No journal folder selected.</p>
            <p id="empty-state-body" class="empty-state-body">Choose a folder to start.</p>
            <button id="empty-state-button" class="button button-secondary no-drag" type="button">
              Choose Folder
            </button>
          </div>
        </section>

        <section id="editor-form" class="editor-form" hidden>
          <label class="field-group" for="entry-date">
            <span class="field-label">Date</span>
            <input id="entry-date" class="text-input date-input" type="date" />
          </label>

          <label class="field-group" for="entry-title">
            <span class="field-label">Title</span>
            <input
              id="entry-title"
              class="text-input title-input"
              type="text"
              placeholder="Untitled"
              autocomplete="off"
            />
          </label>

          <label class="field-group field-grow" for="entry-content">
            <span class="field-label">Content</span>
            <textarea
              id="entry-content"
              class="content-input"
              placeholder="Write in Markdown here..."
              spellcheck="true"
            ></textarea>
          </label>
        </section>
      </main>
    </div>

    <dialog id="confirm-dialog" class="confirm-dialog">
      <form method="dialog" class="confirm-dialog-card">
        <p id="confirm-title" class="confirm-title">Unsaved changes</p>
        <p id="confirm-body" class="confirm-body">
          Save your current work before continuing?
        </p>
        <div id="confirm-actions" class="confirm-actions"></div>
      </form>
    </dialog>

    <div id="folder-toast" class="folder-toast" hidden></div>

    <script src="./renderer.js"></script>
  </body>
</html>
